# vim:foldmethod=marker:foldlevel=0
# Vaiables {{{
$font = JetBrainsMono Nerd Font Mono
# }}}
general { #{{{
    hide_cursor = false
} #}}}
# Fingerprint authntication (disabled) {{{
# Uncomment to use this
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }
# }}}
animations { #{{{
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
} #}}}
background { #{{{
    monitor =
    path = screenshot
    blur_passes = 3
} #}}}
input-field { #{{{
    # Base {{{
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    # }}}
    # Field colors {{{
    inner_color = rgba(0, 0, 0, 0.0) # no fill
    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg
    # }}}
    # Font {{{
    font_color = rgb(143, 143, 143)
    rounding = 15
    font_family = $font
    fade_on_empty = false
    placeholder_text = Input password...
    fail_text = $PAMFAIL
    # }}}
    # Password dots {{{
    # Uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3
    # }}}
    # Doesn't show the password length (disabled) {{{
    # Uncomment to use an input indicator that doesn't show the password length
    # hide_input = true
    # }}}
    # Poistion {{{
    position = 0, -20
    halign = center
    valign = center
    # }}}
} #}}}
# Time {{{
label { 
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 90
    font_family = $font

    position = -30, 0
    halign = right
    valign = top
}
# }}}
# Date {{{
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font

    position = -30, -150
    halign = right
    valign = top
}
# }}}
# Keyboard Layout {{{
label {
    monitor =
    text = $LAYOUT[en,ru]
    font_size = 24
    onclick = hyprctl switchxkblayout all next

    position = 250, -20
    halign = center
    valign = center
}
# }}}
