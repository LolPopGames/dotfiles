# Monitors {{{
monitor=,preferred,auto,auto
# }}}
# My Programs {{{
$terminal = kitty
$fileManager = thunar
$menu = nwg-drawer
$browser = firefox
$notificationDaemon = mako
$editor = vim
$calculator = gnome-calculator
$screenshots = flameshot gui
$menubar = waybar
$clipmgr = cliphist list | wofi --dmenu --pre-display-cmd "echo '%s' | cut -f 2" | cliphist decode | wl-copy
$colorPicker = hyprpicker -al
$launch6 = $terminal
$launch1 = $colorPicker
# }}}
# Autostart {{{
exec-once = systemctl --user import-enviroment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = $notificationDaemon
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = $menubar
exec-once = swaybg -i /usr/share/hypr/wall0.png
exec-once = hyprpm reload
# }}}
# Environment variables {{{
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = VISUAL,vim
env = EDITOR,vim
env = QT_QPA_PLATFORMTHEME,qt5ct
env = ZDOTDIR,~/.config/zsh
# }}}
# Look & Feel {{{
general { #{{{
    # Gaps {{{
    gaps_in = 5
    gaps_out = 10
    # }}}
    # Border {{{
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    # }}}
    # Other {{{
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
    # }}}
} #}}}
decoration { #{{{
    # Rounding {{{
    rounding = 10
    rounding_power = 2
    # }}}
    # Opacity {{{
    active_opacity = 1.0
    inactive_opacity = 1.0
    # }}}
    shadow { #{{{
        enabled = false
        range = 20
        render_power = 3
        color = rgba(1a1a1aee)
    } #}}}
    blur { #{{{
        enabled = false
        size = 3
        passes = 1

        vibrancy = 0.1696
    } #}}}
} #}}}
animations { #{{{
    # Enabled {{{
    enabled = yes
    # }}}
    # Curves {{{
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    # }}}
    # Animations {{{
    #           NAME,          ON/OFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,      10,    default
    animation = border,        1,      5.39,  easeOutQuint
    animation = windows,       1,      4.79,  easeOutQuint
    animation = windowsIn,     1,      4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,      1.49,  linear,       popin 87%
    animation = fadeIn,        1,      1.73,  almostLinear
    animation = fadeOut,       1,      1.46,  almostLinear
    animation = fade,          1,      3.03,  quick
    animation = layers,        1,      3.81,  easeOutQuint
    animation = layersIn,      1,      4,     easeOutQuint, fade
    animation = layersOut,     1,      1.5,   linear,       fade
    animation = fadeLayersIn,  1,      1.79,  almostLinear
    animation = fadeLayersOut, 1,      1.39,  almostLinear
    animation = workspaces,    1,      1.94,  almostLinear, fade
    animation = workspacesIn,  1,      1.21,  almostLinear, fade
    animation = workspacesOut, 1,      1.94,  almostLinear, fade
    animation = zoomFactor,    1,      7,     quick
    # }}}
} #}}}
dwindle { #{{{
    pseudotile = true
    preserve_split = true
} #}}}
master { #{{{
    new_status = master
} #}}}
misc { #{{{
    force_default_wallpaper = -1
    disable_hyprland_logo = false
} #}}}
plugin { #{{{
    hyprexpo { #{{{
        # Base {{{
        columns = 3
        gap_size = 5
        bg_col = rgb(050914)
        workspace_method = first 1
        # }}}
        # Gestures {{{
        gesture_distance = 300
        hyprexpo-gesture = 3, up, expo, toggle
        hyprexpo-gesture = 3, down, expo, toggle
        # }}}
    } #}}}
} #}}}
# }}}
# Input {{{
input { #{{{
    # Keyboard {{{
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:menu_toggle,altwin:swap_ralt_rwin
    kb_rules =
    # }}}
    # Mouse {{{
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    # }}}
    touchpad { #{{{
        natural_scroll = true
    } #}}}
} #}}}
device { # mouse {{{
    name = genius-wireless-device
    sensitivity = 0
} #}}}
device { # touchpad {{{
    name = focaltechps/2-focaltech-touchpad
    sensitivity = 1
    scroll_factor = 2.5
} #}}}
# Gestures {{{
gesture = 3, horizontal, workspace
gesture = 4, down, dispatcher, killactive
gesture = 4, up, dispatcher, exec, $menu
gesture = 4, right, dispatcher, exec, $terminal
gesture = 4, left, dispatcher, exec, $browser
gesture = 3, pinchin, dispatcher, togglefloating
gesture = 3, pinchout, dispatcher, togglefloating
gesture = 4, pinchin, dispatcher, exec, $clipmgr
gesture = 4, pinchout, dispatcher, exec, $clipmgr
# }}}
# Keybindings {{{
# Main Modifier {{{
$mainMod = SUPER
# }}}
# Main {{{
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod, O, exec, gnome-system-monitor
# }}}
# Custom {{{
bind = ALT, F4, killactive,
bind = $mainMod, G, exec, $terminal $editor ~/.config/hypr/hyprland.conf
bind = $mainMod SHIFT, G, exec, $terminal $editor ~/.config
bind = $mainMod, B, exec, pkill -USR2 waybar
bind = $mainMod, F, exec, firefox
bind = $mainMod SHIFT, B, exec, pkill waybar; waybar
bind = CONTROL $mainMod ALT, Q, exec, $terminal --config ~/.config/kitty/pdp11.conf
bind = $mainMod, comma, exec, hyprctl switchxkblayout at-translated-set-2-keyboard next
bind = $mainMod, period, exec, hypremoji
# }}}
# Lock functions {{{
bind = , Num_Lock, exec, ~/.config/hypr/scripts/numlock-toggle
bind = , Caps_Lock, exec, ~/.config/hypr/scripts/capslock-toggle
bind = , Scroll_Lock, exec, ~/.config/hypr/scripts/hardtoggles-update
# }}}
# Hyprexpo {{{
bind = $mainMod, TAB, hyprexpo:expo, toggle
# }}}
# Move focus {{{
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
# }}}
# Switch workspaces {{{
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
# }}}
# Move to workspace {{{
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
# }}}
# Special workspace {{{
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
# }}}
# Scroll through existing workspaces {{{
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
# }}}
# Move/resize windows with mouse {{{
bindm = $mainMod, mouse:272, movewindow # 272 = LMB
bindm = $mainMod, mouse:273, resizewindow # 273 = RMB
# }}}
# Multimedia keys for volume and brightness {{{
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindel = ,XF86ScreenSaver, exec, systemctl suspend
bindel = ,XF86TouchpadToggle, exec, ~/.config/hypr/scripts/touchpad-toggle
# }}}
# Requires playerctl {{{
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
# }}}
# Custom Launchers {{{
bind = , XF86Calculator, exec, $calculator
bind = , XF86Launch1, exec, $launch1
bind = , XF86Launch6, exec, $launch6
bind = , XF86WebCam, exec, $screenshots
# }}}
# Copy/Paste {{{
bind = $mainMod SHIFT, V, exec, $clipmgr
# }}}
# Characters {{{
bind = $mainMod ALT, comma, exec, wtype '«'
bind = $mainMod ALT, period, exec, wtype '»'
bind = $mainMod ALT, minus, exec, wtype '–'
bind = $mainMod SHIFT ALT, minus, exec, wtype '—'
# }}}
# }}}
# }}}
# Window Rules {{{
xwayland { #{{{
    force_zero_scaling = true
} #}}}
# Ignore maximize requests from all apps {{{
windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}
# }}}
# Fix some dragging issues with XWayland {{{
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}
# }}}
# Hyprland-run windowrule {{{
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
# }}}
# GNOME Calculator {{{
windowrule {
    name = gnome-calculator
    match:class = ^(org\.gnome\.Calculator)$

    float = true
    size = 400 600
    center = true
}
# }}}
# HyprEmoji {{{
windowrule {
    name = hypremoji

    float = true
    move = (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.05))
    match:title = ^(HyprEmoji)$
}
# }}}
# File Selection {{{
windowrule {
    name = file-selection

    float = true
    center = true
    size = 1050 680
    match:class = ^(xdg-desktop-portal-gtk)$
}
# }}}
# }}}
