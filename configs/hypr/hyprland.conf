# Monitors {{{
monitor=,preferred,auto,auto
# }}}
# My Programs {{{
$terminal = kitty
$fileManager = thunar
$menu = nwg-drawer
$browser = firefox
$notificationDaemon = mako
$editor = vim
$calculator = gnome-calculator
$screenshots = flameshot gui
$menubar = waybar
$clipmgr = cliphist list | rofi -dmenu | cliphist decode | wl-copy
$colorPicker = hyprpicker -al
$launch6 = $terminal
$launch1 = $colorPicker
# }}}
# Autostart {{{
exec-once = systemctl --user import-enviroment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hyprctl setcursor rose-pine-hyprcursor 25
exec-once = $notificationDaemon
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = $menubar
exec-once = swaybg -i /usr/share/hypr/wall0.png
exec-once = hyprpm reload
# }}}
# Environment variables {{{
env = XCURSOR_THEME,BreezeX-RosePine-Linux
env = XCURSOR_SIZE,25
env = HYPRCURSOR_THEME,rose-pine-hyprcursor
env = HYPRCURSOR_SIZE,25
env = VISUAL,vim
env = EDITOR,vim
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
# }}}
# Look & Feel {{{
general { #{{{
    # Gaps {{{
    gaps_in = 5
    gaps_out = 10
    # }}}
    # Border {{{
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    # }}}
    # Other {{{
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
    # }}}
} #}}}
decoration { #{{{
    # Rounding {{{
    rounding = 10
    rounding_power = 2
    # }}}
    # Opacity {{{
    active_opacity = 1.0
    inactive_opacity = 1.0
    # }}}
    shadow { #{{{
        enabled = false
        range = 20
        render_power = 3
        color = rgba(1a1a1aee)
    } #}}}
    blur { #{{{
        enabled = false
        size = 3
        passes = 1

        vibrancy = 0.1696
    } #}}}
} #}}}
animations { #{{{
    # Enabled {{{
    enabled = yes
    # }}}
    # Curves {{{
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    # }}}
    # Animations {{{
    #           NAME,          ON/OFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,      10,    default
    animation = border,        1,      5.39,  easeOutQuint
    animation = windows,       1,      4.79,  easeOutQuint
    animation = windowsIn,     1,      4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,      1.49,  linear,       popin 87%
    animation = fadeIn,        1,      1.73,  almostLinear
    animation = fadeOut,       1,      1.46,  almostLinear
    animation = fade,          1,      3.03,  quick
    animation = layers,        1,      3.81,  easeOutQuint
    animation = layersIn,      1,      4,     easeOutQuint, fade
    animation = layersOut,     1,      1.5,   linear,       fade
    animation = fadeLayersIn,  1,      1.79,  almostLinear
    animation = fadeLayersOut, 1,      1.39,  almostLinear
    animation = workspaces,    1,      1.94,  almostLinear, fade
    animation = workspacesIn,  1,      1.21,  almostLinear, fade
    animation = workspacesOut, 1,      1.94,  almostLinear, fade
    animation = zoomFactor,    1,      7,     quick
    # }}}
} #}}}
dwindle { #{{{
    preserve_split = true
} #}}}
master { #{{{
    new_status = master
} #}}}
misc { #{{{
    force_default_wallpaper = -1
    disable_hyprland_logo = false
} #}}}
# }}}
# Input {{{
input { #{{{
    # Keyboard {{{
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:menu_toggle,altwin:swap_ralt_rwin
    kb_rules =
    # }}}
    # Mouse {{{
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    # }}}
    touchpad { #{{{
        natural_scroll = true
    } #}}}
} #}}}
device { # mouse {{{
    name = genius-wireless-device
    sensitivity = 0
} #}}}
device { # touchpad {{{
    name = focaltechps/2-focaltech-touchpad
    sensitivity = 1
    scroll_factor = 2.5
} #}}}
# Gestures {{{
gesture = 3, horizontal, workspace
gesture = 4, down, dispatcher, killactive
gesture = 4, up, dispatcher, exec, $menu
gesture = 4, right, dispatcher, exec, $terminal
gesture = 4, left, dispatcher, exec, $browser
gesture = 3, pinchin, dispatcher, togglefloating
gesture = 3, pinchout, dispatcher, togglefloating
gesture = 4, pinchin, dispatcher, exec, $clipmgr
gesture = 4, pinchout, dispatcher, exec, $clipmgr
# }}}
# Keybindings {{{
# Main Modifier {{{
$mainMod = SUPER
# }}}
# Main {{{
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, N, layoutmsg, togglesplit # dwindle
bind = $mainMod, O, exec, gnome-system-monitor
# }}}
# Custom {{{
bind = ALT, F4, killactive,
bind = $mainMod, G, exec, $terminal $editor ~/.config/hypr/hyprland.conf
bind = $mainMod SHIFT, G, exec, $terminal $editor ~/.config
bind = $mainMod, B, exec, pkill -USR2 waybar
bind = $mainMod ALT, B, exec, pkill waybar
bind = $mainMod SHIFT ALT, B, exec, pkill -9 waybar
bind = $mainMod, F, exec, firefox
bind = $mainMod SHIFT, B, exec, pkill waybar; waybar
bind = CONTROL $mainMod ALT, Q, exec, $terminal --config ~/.config/kitty/pdp11.conf
bind = $mainMod, comma, exec, hyprctl switchxkblayout at-translated-set-2-keyboard next
bind = $mainMod, period, exec, hypremoji
bind = $mainMod, D, exec, dialect
bind = $mainMod, T, exec, AyuGram
# }}}
# Lock functions {{{
bind = , Num_Lock, exec, ~/.config/hypr/scripts/numlock-toggle
bind = , Caps_Lock, exec, ~/.config/hypr/scripts/capslock-toggle
bind = , Scroll_Lock, exec, ~/.config/hypr/scripts/hardtoggles-update
# }}}
# Hyprexpo {{{
#bind = $mainMod, TAB, hyprexpo:expo, toggle
# }}}
# Move focus {{{
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r
# }}}
# Switch workspaces {{{
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
# }}}
# Move to workspace {{{
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
# }}}
# Special workspace {{{
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
# }}}
# Scroll through existing workspaces {{{
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
# }}}
# Move/resize windows with mouse {{{
bindm = $mainMod, mouse:272, movewindow # 272 = LMB
bindm = $mainMod, mouse:273, resizewindow # 273 = RMB
# }}}
# Multimedia keys for volume and brightness {{{
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindel = ,XF86ScreenSaver, exec, systemctl suspend
bindel = ,XF86TouchpadToggle, exec, ~/.config/hypr/scripts/touchpad-toggle
# }}}
# Requires playerctl {{{
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
# }}}
# Custom Launchers {{{
bind = , XF86Calculator, exec, $calculator
bind = , XF86Launch1, exec, $launch1
bind = , XF86Launch6, exec, $launch6
bind = , XF86WebCam, exec, $screenshots
# }}}
# Copy/Paste {{{
bind = $mainMod SHIFT, V, exec, $clipmgr
# }}}
# Characters {{{
bind = $mainMod ALT, comma, exec, wtype '«'
bind = $mainMod ALT, period, exec, wtype '»'
bind = $mainMod ALT, minus, exec, wtype '–'
bind = $mainMod SHIFT ALT, minus, exec, wtype '—'
# }}}
# }}}
# }}}
# Window Rules {{{
xwayland { #{{{
    force_zero_scaling = true
} #}}}
# Ignore maximize requests from all apps {{{
windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}
# }}}
# Fix some dragging issues with XWayland {{{
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}
# }}}
# GNOME Calculator {{{
windowrule {
    name = gnome-calculator
    match:class = ^(org\.gnome\.Calculator)$

    float = true
    size = 400 600
    center = true
}
# }}}
# HyprEmoji {{{
windowrule {
    name = hypremoji

    float = true
    move = (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.05))
    match:title = ^(HyprEmoji)$
}
# }}}
# File Selection {{{
windowrule {
    name = file-selection

    float = true
    center = true
    size = 1050 680
    match:class = ^(xdg-desktop-portal-gtk)$
}
# }}}
# Bluetooth {{{
windowrule {
    name = bluetooth

    float = true
    center = true
    size = 760 460
    match:class = ^(blueman-manager)$
}
# }}}
# Color Picker {{{
windowrule {
    name = color-picker

    float = true
    center = true
    size = 728 318
    match:class = ^(nl.hjdskes.gcolor3)$
}
# }}}
# Calendar {{{
windowrule {
    name = calendar

    float = true
    center = true
    size = 360 600
    match:class = ^(org.gnome.Calendar)$
}
# }}}
# Firefox Picture in Picture {{{
windowrule {
    name = firefox-picture-in-picutre

    float = true
    match:title = ^(Picture in Picture|Картинка в картинке)$
}
# }}}
# }}}
# Plugins {{{
plugin {
    #hyprexpo { #{{{
    #    # Base {{{
    #    columns = 3
    #    gap_size = 5
    #    bg_col = rgb(050914)
    #    workspace_method = first 1
    #    # }}}
    #    # Gestures {{{
    #    gesture_distance = 300
    #    hyprexpo-gesture = 3, up, expo, toggle
    #    hyprexpo-gesture = 3, down, expo, toggle
    #    # }}}
    #} #}}}
    dynamic-cursors { #{{{
        enabled = true
        # tilt, rotate, stretch or none
        mode = rotate
        threshold = 2
        rotate { #{{{
            # length in px of the simulated stick used to rotate the cursor
            # most realistic if this is your actual cursor size
            length = 25
            # clockwise offset applied to the angle in degrees
            # this will apply to ALL shapes
            offset = 0.0
        } #}}}
        tilt { #{{{
            # controls how powerful the tilt is, the lower, the more power
            # this value controls at which speed (px/s) the full tilt is reached
            limit = 5000
            # relationship between speed and tilt, supports these values:
            # linear             - a linear function is used
            # quadratic          - a quadratic function is used (most realistic to actual air drag)
            # negative_quadratic - negative version of the quadratic one, feels more aggressive
            # see `activation` in `src/mode/utils.cpp` for how exactly the calculation is done
            function = negative_quadratic
            # time window (ms) over which the speed is calculated
            # higher values will make slow motions smoother but more delayed
            window = 100
            # full tilt for each side (°)
            full_tilt = 60
        } #}}}
        stretch { #{{{
            # controls how much the cursor is stretched
            # this value controls at which speed (px/s) the full stretch is reached
            # the full stretch being twice the original length
            limit = 3000
            # relationship between speed and stretch amount, supports these values:
            # linear             - a linear function is used
            # quadratic          - a quadratic function is used
            # negative_quadratic - negative version of the quadratic one, feels more aggressive
            # see `activation` in `src/mode/utils.cpp` for how exactly the calculation is done
            function = quadratic
            # time window (ms) over which the speed is calculated
            # higher values will make slow motions smoother but more delayed
            window = 100
        } #}}}
        shake { #{{{
            # enables shake to find
            enabled = true
            # use nearest-neighbour (pixelated) scaling when shaking
            # may look weird when effects are enabled
            nearest = true
            # controls how soon a shake is detected
            # lower values mean sooner
            threshold = 6.0
            # magnification level immediately after shake start
            base = 4.0
            # magnification increase per second when continuing to shake
            speed = 4.0
            # how much the speed is influenced by the current shake intensitiy
            influence = 0.0
            # maximal magnification the cursor can reach
            # values below 1 disable the limit (e.g. 0)
            limit = 0.0
            # time in millseconds the cursor will stay magnified after a shake has ended
            timeout = 2000
            # show cursor behaviour `tilt`, `rotate`, etc. while shaking
            effects = false
            # enable ipc events for shake
            # see the `ipc` section below
            ipc = false
        } #}}}
        hyprcursor { #{{{
            # use nearest-neighbour (pixelated) scaling when magnifing beyond texture size
            # this will also have effect without hyprcursor support being enabled
            # 0 / false - never use pixelated scaling
            # 1 / true  - use pixelated when no highres image
            # 2         - always use pixleated scaling
            nearest = true
            # enable dedicated hyprcursor support
            enabled = true
            # resolution in pixels to load the magnified shapes at
            # be warned that loading a very high-resolution image will take a long time and might impact memory consumption
            # -1 means we use [normal cursor size] * [shake:base option]
            resolution = -1
            # shape to use when clientside cursors are being magnified
            # see the shape-name property of shape rules for possible names
            # specifying clientside will use the actual shape, but will be pixelated
            fallback = clientside
        } #}}}
    } #}}}
}
# }}}
